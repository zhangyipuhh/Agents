<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识库管理</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg-primary: #ffffff;
      --color-bg-secondary: #f9fafb;
      --color-bg-tertiary: #f3f4f6;
      --color-bg-hover: #f3f4f6;
      --color-border: #e5e7eb;
      --color-border-light: #f3f4f6;
      --color-text-primary: #111827;
      --color-text-secondary: #4b5563;
      --color-text-muted: #9ca3af;
      --color-accent: #4f46e5;
      --color-accent-light: #eef2ff;
      --color-accent-hover: #4338ca;
      --color-error: #ef4444;
      --color-error-light: #fef2f2;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 12px;
      --font-size-xs: 12px;
      --font-size-sm: 13px;
      --font-size-base: 14px;
      --font-size-md: 15px;
      --font-size-lg: 16px;
      --font-weight-medium: 500;
      --font-weight-semibold: 600;
      --font-weight-bold: 700;
      --line-height-tight: 1.25;
      --line-height-normal: 1.5;
      --line-height-relaxed: 1.75;
      --transition-colors: color 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--color-bg-secondary);
      color: var(--color-text-primary);
      height: 100vh;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .knowledge-page {
      display: flex;
      flex: 1;
      height: 100%;
      overflow: hidden;
      background-color: var(--color-bg-secondary);
    }

    /* 文件列表面板 */
    .file-list-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
      background-color: var(--color-bg-primary);
      border-right: 1px solid var(--color-border);
    }

    .file-list-header {
      flex-shrink: 0;
      padding: 16px 20px;
      border-bottom: 1px solid var(--color-border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .title-icon {
      width: 24px;
      height: 24px;
      color: var(--color-accent);
    }

    .file-list-title {
      font-size: var(--font-size-lg);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
      margin: 0;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      transition: var(--transition-colors);
      border: none;
      background: transparent;
    }

    .btn-primary {
      background-color: var(--color-accent);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--color-accent-hover);
    }

    .btn-secondary {
      background-color: var(--color-bg-tertiary);
      color: var(--color-text-secondary);
    }

    .btn-secondary:hover {
      background-color: var(--color-bg-hover);
      color: var(--color-text-primary);
    }

    .btn-icon {
      width: 16px;
      height: 16px;
    }

    .file-list-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .file-list-body::-webkit-scrollbar {
      width: 6px;
    }

    .file-list-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .file-list-body::-webkit-scrollbar-thumb {
      background-color: var(--color-border);
      border-radius: 9999px;
    }

    .file-list-body::-webkit-scrollbar-thumb:hover {
      background-color: var(--color-text-muted);
    }

    /* 加载动画 */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/knowledge-main.js"></script>
</body>
</html>
