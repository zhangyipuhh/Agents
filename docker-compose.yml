
services:
  agents:
    build:
      context: .
      dockerfile: app/Dockerfile
    image: agents/v1.0
    container_name: preview-app
    restart: always
    ports:
      - "8001:8001"
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app
    env_file:
      - .env
    volumes:
      # ===== 新增（2026-07-09）：让 preview-app 能通过 socket 连宿主机 docker daemon =====
      # 不加这一行，容器内的 docker.DockerClient(base_url='unix:///var/run/docker.sock') 
      # 会因找不到文件/无权限而抛 DockerException，sandbox 工具永远起不了子容器。
      - /var/run/docker.sock:/var/run/docker.sock
      - ./app/shared/tools/mcp/config.yaml:/app/app/shared/tools/mcp/config.yaml:ro
      # 数据目录挂载（2026-07-09：数据从 ./app/data 迁移至项目根 ./data 后改为整体挂载）
      - ./data:/app/data:rw
      # 代码目录挂载（开发模式）：宿主机修改代码后立即生效，无需重建镜像
      - ./app:/app/app:rw
      # 仓库根 agents/ 目录挂载（2026-07-09 新增）：
      #   agents 表的 agents_md_path 是相对路径 agents/<name>/AGENTS.md，
      #   容器 CWD=/app 下需访问 /app/agents/...；挂载到 :rw 以支持开发期
      #   修改 AGENTS.md 后立即生效，无需 docker compose build。
      - ./agents:/app/agents:rw
      # 挂载 .env 文件，让容器内 find_dotenv() 与 pydantic-settings 的 env_file 能正确读取
      - ./.env:/app/.env:ro
    mem_limit: 8g
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - agent_preview-network
  web-agent:
    build:
      context: ./web/Agent
      dockerfile: Dockerfile
    image: web-agent/v1.0
    container_name: preview-web
    restart: always
    ports:
      - "9001:80"
    environment:
      - VITE_API_TARGET=${VITE_API_TARGET:-http://preview-app:8001}
    mem_limit: 8g
    depends_on:
      - agents
    networks:
      - agent_preview-network

# 文件顶部（与 services 平级）
networks:
  agent_preview-network:
    driver: bridge
  preview-network:
  shared-network:
    external: true
 
