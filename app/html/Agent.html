<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent演示页面</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .input-section {
            padding: 30px;
            border-bottom: 1px solid #e0e0e0;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #messageInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #messageInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #sendButton {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #sendButton:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #sendButton:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .quick-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 8px 15px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .output-section {
            padding: 30px;
            background: #f8f9fa;
            min-height: 400px;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .output-header h2 {
            font-size: 20px;
            color: #333;
        }

        .status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .status.idle {
            background: #e0e0e0;
            color: #666;
        }

        .status.loading {
            background: #fff3cd;
            color: #856404;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        #output {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            min-height: 300px;
            max-height: 600px;
            overflow-y: auto;
            word-wrap: break-word;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            line-height: 1.6;
        }

        #output h1, #output h2, #output h3, #output h4, #output h5, #output h6 {
            margin-top: 20px;
            margin-bottom: 10px;
            color: #333;
        }

        #output h1 { font-size: 24px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        #output h2 { font-size: 20px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        #output h3 { font-size: 18px; }
        #output h4 { font-size: 16px; }

        #output p {
            margin: 10px 0;
            line-height: 1.8;
        }

        #output ul, #output ol {
            margin: 10px 0;
            padding-left: 30px;
        }

        #output li {
            margin: 5px 0;
            line-height: 1.6;
        }

        #output ul {
            list-style-type: disc;
        }

        #output ol {
            list-style-type: decimal;
        }

        #output code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #d63384;
        }

        #output pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            margin: 10px 0;
        }

        #output pre code {
            background: none;
            padding: 0;
            color: #333;
        }

        #output blockquote {
            border-left: 4px solid #667eea;
            padding-left: 15px;
            margin: 15px 0;
            color: #666;
            font-style: italic;
        }

        #output strong {
            color: #333;
            font-weight: bold;
        }

        #output em {
            font-style: italic;
        }

        #output a {
            color: #667eea;
            text-decoration: none;
        }

        #output a:hover {
            text-decoration: underline;
        }

        #output table {
            border-collapse: collapse;
            width: 100%;
            margin: 15px 0;
        }

        #output th, #output td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
        }

        #output th {
            background: #f8f9fa;
            font-weight: bold;
        }

        #output hr {
            border: none;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }

        .node-indicator {
            color: #667eea;
            font-weight: bold;
            margin: 15px 0 10px 0;
            padding: 10px;
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            border-radius: 4px;
        }

        .tool-call {
            color: #28a745;
            margin: 10px 0;
            padding: 10px;
            background: #d4edda;
            border-left: 4px solid #28a745;
            border-radius: 4px;
        }

        .tool-result {
            color: #17a2b8;
            margin: 10px 0;
            padding: 10px;
            background: #d1ecf1;
            border-left: 4px solid #17a2b8;
            border-radius: 4px;
        }

        .error-message {
            color: #dc3545;
            background: #f8d7da;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .typing-indicator {
            display: inline-block;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .clear-btn {
            padding: 8px 20px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .clear-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Agent 演示页面</h1>
            <p>使用 Server-Sent Events (SSE) 实现实时流式响应</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="输入您的问题..."
                    value="民法的作用，中国民法典的由来"
                >
                <button id="sendButton">发送</button>
            </div>
            <div class="quick-actions">
                <button class="quick-btn" onclick="setQuickMessage('民法的作用，中国民法典的由来')">民法的作用</button>
                <button class="quick-btn" onclick="setQuickMessage('什么是人工智能？')">什么是AI？</button>
                <button class="quick-btn" onclick="setQuickMessage('Python的主要特点')">Python特点</button>
                <button class="quick-btn" onclick="setQuickMessage('介绍一下机器学习')">机器学习</button>
            </div>
        </div>

        <div class="output-section">
            <div class="output-header">
                <h2>📋 响应输出</h2>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <span id="status" class="status idle">空闲</span>
                    <button class="clear-btn" onclick="clearOutput()">清空</button>
                </div>
            </div>
            <div id="output"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api/agent/chat';
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const output = document.getElementById('output');
        const status = document.getElementById('status');

        let currentStream = null;
        let currentContent = '';
        let currentNode = null;
        let markdownContainer = null;

        function setQuickMessage(message) {
            messageInput.value = message;
            messageInput.focus();
        }

        function clearOutput() {
            output.innerHTML = '';
            currentContent = '';
            currentNode = null;
            markdownContainer = null;
        }

        function updateStatus(state, message) {
            status.className = `status ${state}`;
            status.textContent = message;
        }

        function appendToOutput(content, className = '') {
            const div = document.createElement('div');
            if (className) {
                div.className = className;
            }
            // 将字符串形式的 \n 转换为真正的换行符
            content = content.replace(/\\n/g, '\n');
            div.innerHTML = content;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        function createMarkdownContainer() {
            if (!markdownContainer) {
                markdownContainer = document.createElement('div');
                markdownContainer.className = 'markdown-content';
                markdownContainer.style.margin = '15px 0';
                markdownContainer.style.padding = '15px';
                markdownContainer.style.background = '#fafafa';
                markdownContainer.style.borderRadius = '8px';
                markdownContainer.style.borderLeft = '4px solid #667eea';
                output.appendChild(markdownContainer);
            }
            return markdownContainer;
        }

        function updateMarkdownContent(content) {
            const container = createMarkdownContainer();
            // 将字符串形式的 \n 转换为真正的换行符
            content = content.replace(/\\n/g, '\n');
            const htmlContent = marked.parse(content);
            container.innerHTML = htmlContent;
            output.scrollTop = output.scrollHeight;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            if (currentStream) {
                alert('请等待当前请求完成');
                return;
            }

            clearOutput();
            sendButton.disabled = true;
            updateStatus('loading', '正在处理...');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('event: ')) {
                            const eventType = line.substring(7);
                            console.log('Event:', eventType);
                            
                            if (eventType === 'end') {
                                updateStatus('success', '完成');
                                appendToOutput('<br>✅ 会话结束', 'node-indicator');
                            } else if (eventType === 'error') {
                                updateStatus('error', '错误');
                            }
                        } else if (line.startsWith('data: ')) {
                            const data = line.substring(6);
                            if (data) {
                                try {
                                    const event = JSON.parse(data);
                                    const eventType = event.event;
                                    const eventData = event.data || {};

                                    switch (eventType) {
                                        case 'on_chain_start':
                                            const nodeName = event.name;
                                            if (nodeName && nodeName !== currentNode) {
                                                currentNode = nodeName;
                                                appendToOutput(`📍 节点: ${nodeName}`, 'node-indicator');
                                            }
                                            break;

                                        case 'on_chat_model_stream':
                                            const chunk = eventData.chunk;
                                            if (chunk) {
                                                let content = '';
                                                
                                                if (typeof chunk === 'string') {
                                                    const match = chunk.match(/content='([^']*)'/) || chunk.match(/content="([^"]*)"/);
                                                    if (match) {
                                                        content = match[1];
                                                    }
                                                } else if (typeof chunk === 'object' && chunk.content) {
                                                    content = chunk.content;
                                                }

                                                if (content) {
                                                    currentContent += content;
                                                    updateMarkdownContent(currentContent);
                                                }
                                            }
                                            break;

                                        case 'on_chat_model_end':
                                            if (markdownContainer) {
                                                markdownContainer = null;
                                                currentContent = '';
                                            }
                                            break;

                                        case 'on_tool_start':
                                            const toolName = eventData.input?.name || '';
                                            const toolArgs = eventData.input?.args || {};
                                            appendToOutput(`🔧 调用工具: ${toolName}<br>参数: ${JSON.stringify(toolArgs)}`, 'tool-call');
                                            break;

                                        case 'on_tool_end':
                                            const toolResult = eventData.output || '';
                                            const resultPreview = typeof toolResult === 'string' 
                                                ? toolResult.substring(0, 100) + (toolResult.length > 100 ? '...' : '')
                                                : JSON.stringify(toolResult).substring(0, 100) + '...';
                                            appendToOutput(`📋 工具结果: ${resultPreview}`, 'tool-result');
                                            break;
                                    }
                                } catch (e) {
                                    console.error('解析JSON失败:', e, data);
                                }
                            }
                        }
                    }
                }

                updateStatus('success', '完成');

            } catch (error) {
                console.error('请求失败:', error);
                updateStatus('error', '错误');
                appendToOutput(`❌ 错误: ${error.message}`, 'error-message');
            } finally {
                sendButton.disabled = false;
                currentStream = null;
            }
        }

        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        window.addEventListener('beforeunload', () => {
            if (currentStream) {
                currentStream.abort();
            }
        });
    </script>
</body>
</html>
