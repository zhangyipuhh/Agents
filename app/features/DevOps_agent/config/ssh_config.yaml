# SSH 服务器配置文件
# 配置远程服务器的连接信息

servers:
  - name: "本地测试服务器"
    host: "127.0.0.1"
    port: 22
    username: "admin"
    password: "your_password_here"  # 或使用 private_key_path
    # private_key_path: "/path/to/private/key"
    server_type: "linux"  # linux 或 windows
    timeout: 30

  - name: "生产服务器-Linux"
    host: "192.168.1.100"
    port: 22
    username: "root"
    private_key_path: "/home/user/.ssh/id_rsa"
    server_type: "linux"
    timeout: 30

  - name: "生产服务器-Windows"
    host: "192.168.1.101"
    port: 22
    username: "Administrator"
    password: "your_password_here"
    server_type: "windows"
    timeout: 60
